name: uptime-check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check sites (MCS.live)
        run: |
          check() {
            BASE_URL=$1
            URL="$BASE_URL/MCS.live"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            TIME_TOTAL=$(curl -s -o /dev/null -w "%{time_total}" --max-time 10 "$URL")

            TIME_MS=$(awk "BEGIN {print $TIME_TOTAL * 1000}")
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

            if [ "$HTTP_CODE" = "200" ]; then
              STATUS="online"
            else
              STATUS="offline"
              TIME_MS=0
            fi

            echo "{\"url\":\"$BASE_URL\",\"status\":\"$STATUS\",\"response_time_ms\":$TIME_MS,\"time\":\"$TIMESTAMP\"}"
          }

          {
            echo "["
            check "https://dj-matz.nl"
            echo ","
            check "https://nawijn.nl.eu.org"
            echo ","
            check "https://vishandelnawijn.nl"
            echo "]"
          } > status.json

      - name: Commit result
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"

          git add status.json

          git commit -m "update status" || echo "no changes"

          git push origin main
