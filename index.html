<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCS Status</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#121a24;
      --text:#e6f1ff;
      --muted:#8aa0b6;
      --green:#3cff8f;
      --red:#ff4d4d;
      --blue:#4da3ff;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      padding:30px;
      text-align:center;
      border-bottom:1px solid #1c2a3a;
    }

    h1{
      margin:0;
      font-size:32px;
      letter-spacing:2px;
    }

    .sub{
      color:var(--muted);
      margin-top:8px;
    }

    .container{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap:20px;
      padding:30px;
    }

    .card{
      background:var(--card);
      padding:20px;
      border-radius:16px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
      border:1px solid #1b2a3a;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:var(--blue);
    }

    .status{
      font-weight:bold;
      margin-top:10px;
    }

    .online{ color:var(--green); }
    .offline{ color:var(--red); }

    .time{
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
    }

    .latency{
      margin-top:10px;
      font-size:14px;
    }

    footer{
      text-align:center;
      padding:20px;
      color:var(--muted);
      border-top:1px solid #1c2a3a;
    }
  </style>
</head>
<body>

<header>
  <h1>MCS STATUS</h1>
  <div class="sub">Live server monitoring dashboard</div>
</header>

<div class="container" id="grid"></div>

<footer>
  MCS Monitoring System • auto-updating
</footer>

<script>
const DATA_URL = "status.json";

async function load(){
  try{
    const res = await fetch(DATA_URL);
    const data = await res.json();

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.forEach(s => {
      const card = document.createElement("div");
      card.className = "card";

      const statusClass = s.status === "online" ? "online" : "offline";

      card.innerHTML = `
        <h2>${s.url}</h2>
        <div class="status ${statusClass}">${s.status.toUpperCase()}</div>
        <div class="latency">Latency: ${Number(s.response_time_ms).toFixed(0)} ms</div>
        <div class="time">${s.time}</div>
      `;

      grid.appendChild(card);
    });

  }catch(e){
    console.error(e);
  }
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
